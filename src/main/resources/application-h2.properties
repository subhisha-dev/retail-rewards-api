# H2 In-Memory Database Configuration
# This is the default profile and can be explicitly activated with: -Dspring.profiles.active=h2
# Or by setting SPRING_PROFILES_ACTIVE=h2

spring.datasource.url=jdbc:h2:mem:rewards_db;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=false
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# JPA/Hibernate Configuration for H2
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true

# H2 Console for debugging
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console
